<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PBYT Store Official Website</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0d1117;
            color: #c9d1d9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background-color: #161b22;
            padding: 40px;
            border-radius: 12px;
            border: 1px solid #30363d;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 400px;
            width: 100%;
        }
        h1 {
            color: #58a6ff;
            margin-bottom: 30px;
            font-size: 24px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 12px 0;
            margin: 10px 0;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
            box-sizing: border-box;
        }
        .btn-github {
            background-color: #21262d;
            color: #c9d1d9;
            border: 1px solid #f0f6fc1a;
        }
        .btn-github:hover {
            background-color: #30363d;
            border-color: #8b949e;
        }
        .btn-download {
            background-color: #238636;
            color: white;
        }
        .btn-download:hover {
            background-color: #2ea043;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>PBYT Store Official Website</h1>
        
        <!-- Кнопка перехода в репозиторий -->
        <a href="https://github.com" class="btn btn-github" target="_blank">
            GitHub Repository
        </a>

        <!-- Кнопка скачивания архива проекта -->
        <a href="https://github.com/archive/refs/heads/main.zip" class="btn btn-download">
            Download
        </a>
    </div>

</body>
</html>
