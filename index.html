<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PBYT Store Official</title>
    <link rel="icon" type="image/x-icon" href="icon.ico">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #090a0f; color: #c9d1d9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: #161b22; padding: 40px; border-radius: 20px; border: 1px solid #30363d; text-align: center; max-width: 450px; width: 100%; box-shadow: 0 10px 50px rgba(0,0,0,0.5); }
        .logo { width: 80px; height: 80px; margin-bottom: 15px; border-radius: 18px; border: 2px solid #58a6ff; padding: 5px; background: #0d1117; }
        h1 { color: #ffffff; margin: 0; font-size: 26px; }
        .subtitle { color: #8b949e; margin-bottom: 20px; font-size: 14px; text-transform: uppercase; }
        .info-section { text-align: left; background: rgba(48, 54, 61, 0.3); border-radius: 10px; padding: 15px; margin-bottom: 15px; border-left: 3px solid #58a6ff; }
        .info-title { font-size: 12px; font-weight: bold; color: #58a6ff; margin-bottom: 5px; }
        .info-list { margin: 0; padding-left: 15px; font-size: 13px; color: #d1d7de; list-style: square; }
        .btn { display: block; width: 100%; padding: 16px 0; margin: 10px 0; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 15px; transition: 0.2s; box-sizing: border-box; text-align: center; }
        .btn-github { background: #21262d; color: #c9d1d9; border: 1px solid #444c56; }
        .btn-download { background: #238636 !important; color: white !important; }
        .btn-discord { background: #5865F2 !important; color: white !important; }
        .btn:hover { opacity: 0.8; transform: translateY(-2px); }
        footer { margin-top: 25px; font-size: 11px; color: #484f58; }
    </style>
</head>
<body>
    <div class="card">
        <img src="icon.ico" alt="Logo" class="logo">
        <h1>PBYT Store</h1>
        <div class="subtitle">Official Website</div>
        
        <div class="info-section">
            <div class="info-title">🚀 WHAT'S NEW?</div>
            <ul class="info-list">
                <li>Initial release of PBYT Store</li>
                <li>Optimized download speed</li>
            </ul>
        </div>

        <div class="info-section" style="border-left-color: #d29922;">
            <div class="info-title">💻 SYSTEM NEEDS</div>
            <ul class="info-list">
                <li>Windows 10/11 (64-bit)</li>
                <li>50MB free space</li>
            </ul>
        </div>

        <!-- 1. ПОЛНАЯ ССЫЛКА НА ГИТХАБ -->
        <a href="https://github.com/PlayARZYT/PBYT-Store" class="btn btn-github" target="_blank">View on GitHub</a>
        
        <!-- 2. ПОЛНАЯ ССЫЛКА НА СКАЧИВАНИЕ -->
        <a href="https://github.com/PlayARZYT/PBYT-Store/releases/download/releases/PBYT_Store_v.0.0.1_Setup.exe" class="btn btn-download">Download for Windows</a>
        
        <!-- 3. ПОЛНАЯ ССЫЛКА НА ДИСКОРД -->
        <a href="https://discord.gg/R9SERUHS" class="btn btn-discord" target="_blank">Join Discord Server</a>

        <footer>© 2024 PBYT Studios Team</footer>
    </div>
</body>
</html>
