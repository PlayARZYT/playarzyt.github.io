<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PBYT Store Official Website</title>
    <!-- Иконка во вкладке браузера -->
    <link rel="icon" type="image/x-icon" href="icon.ico">
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            color: #c9d1d9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .card {
            background-color: rgba(22, 27, 34, 0.9);
            padding: 50px;
            border-radius: 20px;
            border: 1px solid #30363d;
            text-align: center;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
            max-width: 450px;
            width: 100%;
            backdrop-filter: blur(10px);
            animation: fadeIn 1s ease-out;
        }

        /* Обводка и стиль для иконки */
        .logo {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            border-radius: 18px;
            border: 2px solid #58a6ff; /* Синяя обводка */
            padding: 5px;
            background: #161b22;
            box-shadow: 0 0 15px rgba(88, 166, 255, 0.4); /* Свечение обводки */
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            color: #ffffff;
            margin-bottom: 5px;
            font-size: 28px;
            text-shadow: 0 0 10px rgba(88, 166, 255, 0.5);
        }

        .subtitle {
            color: #8b949e;
            margin-bottom: 30px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 15px 0;
            margin: 15px 0;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-sizing: border-box;
            border: none;
            cursor: pointer;
        }

        .btn-github {
            background-color: #21262d;
            color: #c9d1d9;
            border: 1px solid #444c56;
        }

        .btn-github:hover {
            background-color: #30363d;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
        }

        .btn-download {
            background: linear-gradient(135deg, #238636 0%, #2ea043 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(35, 134, 54, 0.3);
        }

        .btn-download:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 8px 25px rgba(46, 160, 67, 0.5);
        }

        footer {
            margin-top: 30px;
            font-size: 12px;
            color: #484f58;
        }

        .status-dot {
            height: 8px;
            width: 8px;
            background-color: #238636;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
            box-shadow: 0 0 8px #238636;
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- Твоя иконка с обводкой -->
        <img src="icon.ico" alt="Logo" class="logo">

        <h1>PBYT Store</h1>
        <div class="subtitle">Official Distribution</div>
        
        <p style="font-size: 14px; color: #8b949e; margin-bottom: 20px;">
            <span class="status-dot"></span> Server Online v0.0.1
        </p>

        <a href="https://github.com/PlayARZYT/PBYT-Store" class="btn btn-github" target="_blank">
            View on GitHub
        </a>

        <a href="https://github.com/PlayARZYT/PBYT-Store/releases/download/releases/PBYT_Store_v.0.0.1_Setup.exe" class="btn btn-download">
            Download for Windows
        </a>

        <footer>
            © 2024 PlayARZYT Development
        </footer>
    </div>

</body>
</html>
